version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: protocolo_db
    environment:
      POSTGRES_DB: protocolozerodb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: